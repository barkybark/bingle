<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bingle — 영어 말하기 연습</title>
  <style>
    :root {
      --orange: #F5A623;
      --orange-dark: #E8941A;
      --navy: #1A1A2E;
      --navy-mid: #16213E;
      --navy-light: #1e2d4a;
      --white: #FFFFFF;
      --green: #27AE60;
      --red: #E74C3C;
      --font: 'Segoe UI', 'Apple SD Gothic Neo', -apple-system, sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--navy); color: var(--white); display: flex; flex-direction: column; height: 100dvh; }

    /* 헤더 */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: var(--navy-mid);
      border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
    }
    .logo { font-size: 20px; font-weight: 700; color: var(--orange); }
    .logo span { color: var(--white); font-weight: 300; font-size: 13px; margin-left: 6px; opacity: .6; }
    .count-badge {
      background: rgba(245,166,35,.12); border: 1px solid rgba(245,166,35,.3);
      border-radius: 20px; padding: 4px 14px; font-size: 13px;
      color: var(--orange); font-weight: 700;
    }
    .count-badge.urgent { background: rgba(231,76,60,.15); border-color: rgba(231,76,60,.4); color: var(--red); }

    /* 화면 전환 */
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    /* 로그인 */
    #login-screen { justify-content: center; align-items: center; padding: 40px 24px; }
    .login-card { background: var(--navy-mid); border: 1px solid rgba(255,255,255,.08); border-radius: var(--radius); padding: 40px 32px; width: 100%; max-width: 400px; text-align: center; }
    .login-logo { font-size: 48px; font-weight: 800; color: var(--orange); margin-bottom: 4px; }
    .login-tagline { color: rgba(255,255,255,.5); font-size: 14px; margin-bottom: 40px; }
    .login-label { text-align: left; font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 8px; display: block; }
    .login-input { width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: var(--radius-sm); color: var(--white); font-size: 15px; padding: 14px 16px; font-family: var(--font); outline: none; transition: border .2s; }
    .login-input:focus { border-color: var(--orange); }
    .login-input::placeholder { color: rgba(255,255,255,.25); }
    .login-btn { width: 100%; background: var(--orange); border: none; border-radius: var(--radius-sm); color: var(--navy); font-size: 16px; font-weight: 700; padding: 15px; margin-top: 16px; cursor: pointer; font-family: var(--font); transition: background .2s; }
    .login-btn:hover { background: var(--orange-dark); }
    .login-error { color: #ff6b6b; font-size: 13px; margin-top: 12px; display: none; }
    .login-hint { color: rgba(255,255,255,.3); font-size: 12px; margin-top: 24px; line-height: 1.6; }

    /* 메인 카드 화면 */
    #card-screen { background: var(--navy); }
    .card-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
    .unit-label { font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
    .main-card { background: var(--navy-mid); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 32px 26px; width: 100%; max-width: 480px; text-align: center; }
    .topic-tag { display: inline-block; background: rgba(245,166,35,.12); border: 1px solid rgba(245,166,35,.25); border-radius: 20px; padding: 4px 14px; font-size: 12px; color: var(--orange); font-weight: 600; margin-bottom: 20px; }

    .korean-text { font-size: 22px; line-height: 1.6; color: var(--white); font-weight: 600; min-height: 70px; display: flex; align-items: center; justify-content: center; }
    .topic-card {
      background: var(--navy-mid);
      border: 2px solid rgba(245,166,35,.35);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .1s;
      width: 100%;
      font-family: var(--font);
    }
    .topic-card:hover {
      border-color: var(--orange);
      background: var(--navy-light);
    }
    .topic-card:active {
      transform: scale(0.98);
    }
    .topic-card .name {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
    }
    .answer-reveal {
      margin-top: 18px; padding: 14px 16px;
      background: rgba(245,166,35,.08); border: 1px solid rgba(245,166,35,.25);
      border-radius: var(--radius-sm); font-size: 16px; color: var(--orange);
      font-weight: 500; display: none; line-height: 1.5;
      white-space: pre-line;
    }
    .answer-reveal.visible { display: block; }

    .wave-container { display: flex; align-items: center; justify-content: center; gap: 4px; height: 40px; margin: 18px 0 6px; }
    .wave-bar { width: 4px; background: var(--orange); border-radius: 4px; height: 5px; transition: height .15s ease; opacity: .6; }
    .wave-bar.active { animation: wave var(--dur, .8s) ease-in-out infinite alternate; }
    @keyframes wave { from { height: 5px; opacity: .4; } to { height: var(--mh, 32px); opacity: 1; } }

    .status-text { font-size: 14px; color: rgba(255,255,255,.6); margin: 4px 0; min-height: 20px; }
    .status-text.listening { color: var(--orange); font-weight: 600; }
    .status-text.pass { color: var(--green); font-weight: 700; }
    .status-text.fail { color: var(--red); font-weight: 600; }

    .live-transcript { font-size: 14px; color: rgba(255,255,255,.45); min-height: 20px; font-style: italic; margin-top: 4px; }

    .attempt-row { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 14px; }
    .attempt-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.15); }
    .attempt-dot.done { background: var(--orange); }

    /* 컨트롤 */
    .controls { display: flex; gap: 12px; justify-content: center; padding: 16px 20px 22px; flex-shrink: 0; }
    .mic-btn {
      width: 64px; height: 64px; border-radius: 50%; border: none;
      background: var(--orange); cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, background .2s; font-size: 26px;
    }
    .mic-btn:active { transform: scale(.93); }
    .mic-btn.listening { background: var(--red); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)} 50%{box-shadow:0 0 0 14px rgba(231,76,60,0)} }
    .skip-btn {
      padding: 0 24px; height: 48px; border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.6); font-size: 14px; cursor: pointer; font-family: var(--font);
    }

    /* 세션 종료 */
    #end-screen { justify-content: center; align-items: center; padding: 40px 24px; text-align: center; }
    .end-card { background: var(--navy-mid); border: 1px solid rgba(255,255,255,.08); border-radius: var(--radius); padding: 40px 32px; width: 100%; max-width: 400px; }
    .end-icon { font-size: 56px; margin-bottom: 16px; }
    .end-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .end-sub { color: rgba(255,255,255,.5); font-size: 14px; line-height: 1.7; margin-bottom: 28px; }
    .end-stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
    .end-stat { background: rgba(255,255,255,.05); border-radius: var(--radius-sm); padding: 14px 20px; }
    .end-stat .val { font-size: 26px; font-weight: 800; color: var(--orange); }
    .end-stat .lbl { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 2px; }

    /* 로딩 */
    .loading-overlay { position: fixed; inset: 0; background: rgba(26,26,46,.95); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(245,166,35,.2); border-top-color: var(--orange); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: rgba(255,255,255,.6); font-size: 14px; }

    @media (min-width: 600px) { .korean-text { font-size: 24px; } .main-card { padding: 40px 36px; } }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">로그인 확인 중...</div>
</div>

<div id="header" style="display:none">
  <div class="logo">Bingle <span id="header-mode">영어 말하기</span></div>
  <div class="count-badge" id="count-badge" style="display:none;">0/10</div>
</div>

<!-- 로그인 -->
<div class="screen active" id="login-screen">
  <div class="login-card">
    <div class="login-logo">Bingle</div>
    <div class="login-tagline">영어 말하기 연습</div>
    <label class="login-label">이메일로 받은 접근 토큰을 입력하세요</label>
    <input class="login-input" id="token-input" type="text" placeholder="토큰을 입력하세요"
      autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">시작하기</button>
    <div class="login-hint">발급받은 토큰을 입력하면 연습이 시작됩니다.<br>하루 최대 30회까지 연습할 수 있어요.</div>
  </div>
</div>

<!-- 모드 선택 -->
<div class="screen" id="mode-screen">
  <div class="card-area">
    <div class="main-card" style="text-align:center;">
      <div class="topic-tag" style="margin-bottom:24px;">모드를 선택하세요</div>
      <div style="display:flex; flex-direction:column; gap:14px;">
        <button class="login-btn" style="background:var(--orange);" onclick="selectMode('study')">📖 공부 (무제한, 텍스트 보기)</button>
        <button class="login-btn" style="background:rgba(255,255,255,.1); color:var(--white);" onclick="selectMode('test')">🎤 테스트 (하루 10회, 말하기 평가)</button>
      </div>
    </div>
  </div>
</div>

<!-- 챕터 선택 -->
<div class="screen" id="chapter-screen">
  <div class="card-area" style="overflow-y:auto; align-items:stretch; padding:20px;">
    <div class="unit-label" id="chapter-mode-label" style="text-align:center; margin-bottom:16px;">UNIT 선택</div>
    <div id="chapter-list" style="display:flex; flex-direction:column; gap:10px; max-width:480px; margin:0 auto; width:100%;"></div>
  </div>
</div>

<!-- 암기카드 화면 -->
<div class="screen" id="card-screen">
  <div class="card-area">
    <div class="unit-label" id="unit-label">UNIT 1</div>
    <div class="main-card">
      <div class="topic-tag" id="topic-tag">Loading...</div>
      <div class="korean-text" id="korean-text">불러오는 중...</div>
      <div class="answer-reveal" id="answer-reveal"></div>
      <div class="wave-container" id="wave-container"></div>
      <div class="status-text" id="status-text">버튼을 눌러 시작하세요</div>
      <div class="live-transcript" id="live-transcript"></div>
      <div class="attempt-row" id="attempt-row"></div>
    </div>
  </div>
  <div class="controls" id="test-controls">
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
    <button class="skip-btn" onclick="nextCard()">건너뛰기</button>
  </div>
  <div class="controls" id="study-controls" style="display:none;">
    <button class="skip-btn" onclick="prevCard()">← 이전</button>
    <button class="mic-btn" style="font-size:16px;" onclick="revealStudyAnswer()">정답 보기</button>
    <button class="skip-btn" onclick="nextCard()">다음 →</button>
  </div>
</div>

<!-- 세션 종료 -->
<div class="screen" id="end-screen">
  <div class="end-card">
    <div class="end-icon">🎉</div>
    <div class="end-title" id="end-title">오늘 연습 완료!</div>
    <div class="end-sub" id="end-sub">수고하셨어요. 내일 다시 도전해보세요!</div>
    <div class="end-stats">
      <div class="end-stat"><div class="val" id="stat-pass">0</div><div class="lbl">통과</div></div>
      <div class="end-stat"><div class="val" id="stat-total">0</div><div class="lbl">총 시도</div></div>
    </div>
  </div>
</div>

<script>
const API_BASE = '';
const MAX_REPEAT = 4; // 한 카드당 최대 반복 시도 (실패해도 이 횟수 넘으면 다음 카드로)

let state = {
  token: null,
  allSentences: [],
  mode: null,            // 'study' | 'test'
  selectedUnit: null,    // 선택한 유닛 번호 (null이면 전체)
  deck: [],
  deckIndex: 0,
  currentCard: null,
  attemptOnCard: 0,
  usedToday: 0,
  limitToday: 10,
  passCount: 0,
  recognition: null,
  isListening: false,
};

// ── 텍스트 유사도 비교 (서버와 동일 로직을 프론트에도 둬서 즉시 반응) ──
function normalize(text) {
  return text.toLowerCase().trim().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ');
}
function similarity(a, b) {
  a = normalize(a); b = normalize(b);
  if (a === b) return 1;
  const aWords = a.split(' '), bWords = b.split(' ');
  const setA = new Set(aWords), setB = new Set(bWords);
  let common = 0;
  setA.forEach(w => { if (setB.has(w)) common++; });
  return (2 * common) / (setA.size + setB.size || 1);
}

// ── 초기화 ──
async function init() {
  const wc = document.getElementById('wave-container');
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'wave-bar';
    b.style.setProperty('--dur', (.45 + Math.random() * .5) + 's');
    b.style.setProperty('--mh', (10 + Math.random() * 24) + 'px');
    wc.appendChild(b);
  }

  const res = await fetch('/data/sentences.json');
  state.allSentences = await res.json();

  const urlToken = new URLSearchParams(window.location.search).get('token');
  const savedToken = localStorage.getItem('bingle_token');
  const token = urlToken || savedToken;
  if (token) {
    document.getElementById('token-input').value = token;
    await doLogin();
  } else {
    hideLoading();
  }
}

async function doLogin() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) return;
  showLoading('인증 중...');
  hideError();
  try {
    const res = await fetch(`${API_BASE}/api/auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.detail || '인증 실패'); hideLoading(); return; }

    state.token = token;
    state.usedToday = data.usage.used;
    state.limitToday = data.usage.limit;
    localStorage.setItem('bingle_token', token);

  showScreen('mode-screen');
    hideLoading();
  } catch {
    showError('서버 연결 실패. 잠시 후 다시 시도해주세요.');
    hideLoading();
  }
}

function buildDeck() {
  // 선택한 유닛만 필터링 (selectedUnit이 null이면 전체)
  let source = state.allSentences;
  if (state.selectedUnit !== null) {
    source = source.filter(c => c.unit === state.selectedUnit);
  }
  if (state.mode === 'study') {
    // 공부 모드는 순서대로 (유닛 내 원래 순서 유지)
    state.deck = [...source];
  } else {
    // 테스트 모드는 랜덤 셔플
    state.deck = [...source].sort(() => Math.random() - 0.5);
  }
  state.deckIndex = 0;
}

// ── 모드 선택 ──
function selectMode(mode) {
  state.mode = mode;
  state.limitToday = 10; // 테스트 모드 기준 (공부 모드는 체크 안 함)
  showChapterScreen();
}

function showChapterScreen() {
  const label = document.getElementById('chapter-mode-label');
  label.textContent = state.mode === 'study' ? '📖 공부할 챕터를 선택하세요' : '🎤 테스트할 챕터를 선택하세요';

  // 유닛 목록 구성
  const units = {};
  state.allSentences.forEach(c => {
    if (!units[c.unit]) units[c.unit] = { topic: c.topic, count: 0 };
    units[c.unit].count++;
  });

  const list = document.getElementById('chapter-list');
  list.innerHTML = '';

  // 전체 보기 옵션
  const allBtn = document.createElement('button');
  allBtn.className = 'topic-card';
  allBtn.style.textAlign = 'left';
  allBtn.innerHTML = `<div class="name">전체 (${state.allSentences.length}개)</div>`;
  allBtn.onclick = () => chooseUnit(null);
  list.appendChild(allBtn);

  Object.keys(units).sort((a, b) => a - b).forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'topic-card';
    btn.style.textAlign = 'left';
    btn.innerHTML = `<div class="name">Unit ${u}: ${units[u].topic} (${units[u].count}개)</div>`;
    btn.onclick = () => chooseUnit(Number(u));
    list.appendChild(btn);
  });

  showScreen('chapter-screen');
}

function chooseUnit(unitNum) {
  state.selectedUnit = unitNum;
  buildDeck();
  startSession();
}

function startSession() {
  document.getElementById('header').style.display = 'flex';
  document.getElementById('header-mode').textContent = state.mode === 'study' ? '공부 모드' : '테스트 모드';

  const badge = document.getElementById('count-badge');
  const testControls = document.getElementById('test-controls');
  const studyControls = document.getElementById('study-controls');

  if (state.mode === 'study') {
    badge.style.display = 'none';
    testControls.style.display = 'none';
    studyControls.style.display = 'flex';
  } else {
    badge.style.display = 'inline-block';
    testControls.style.display = 'flex';
    studyControls.style.display = 'none';
    updateCountBadge();
  }

  showScreen('card-screen');
  hideLoading();
  loadCard();
}

function loadCard() {
  // 테스트 모드만 하루 횟수 체크
  if (state.mode === 'test' && state.usedToday >= state.limitToday) {
    endSession();
    return;
  }

  if (state.deckIndex >= state.deck.length) {
    if (state.mode === 'study') {
      // 공부 모드: 챕터를 다 보면 종료 화면으로
      endSession();
      return;
    }
    // 테스트 모드: 같은 챕터(또는 전체) 내에서 다시 셔플
    let source = state.allSentences;
    if (state.selectedUnit !== null) {
      source = source.filter(c => c.unit === state.selectedUnit);
    }
    state.deck = [...source].sort(() => Math.random() - 0.5);
    state.deckIndex = 0;
  }

  state.currentCard = state.deck[state.deckIndex];
  state.attemptOnCard = 0;

  const c = state.currentCard;
  document.getElementById('unit-label').textContent = `UNIT ${c.unit} — ${c.topic.toUpperCase()}`;
  document.getElementById('topic-tag').textContent = c.topic;
  document.getElementById('korean-text').textContent = c.korean;
  document.getElementById('answer-reveal').classList.remove('visible');
  document.getElementById('answer-reveal').textContent = '';
  document.getElementById('live-transcript').textContent = '';
  renderAttemptDots();

  if (state.mode === 'study') {
    setStatus(`${state.deckIndex + 1} / ${state.deck.length}`, '');
  } else {
    setStatus('🎤 버튼을 눌러 영어로 말해보세요', '');
  }
}

// ── 공부 모드 전용 ──
function revealStudyAnswer() {
  const reveal = document.getElementById('answer-reveal');
  const note = state.currentCard.keyword_note ? `\n\n${state.currentCard.keyword_note}` : '';
  reveal.textContent = '💡 ' + state.currentCard.sentence + note;
  reveal.classList.add('visible');
}

function prevCard() {
  if (state.deckIndex > 0) {
    state.deckIndex--;
    loadCard();
  }
}

function renderAttemptDots() {
  const row = document.getElementById('attempt-row');
  row.innerHTML = '';
  for (let i = 0; i < MAX_REPEAT; i++) {
    const dot = document.createElement('div');
    dot.className = 'attempt-dot' + (i < state.attemptOnCard ? ' done' : '');
    row.appendChild(dot);
  }
}

// ── 마이크 ──
function toggleMic() {
  if (state.isListening) {
    if (state.recognition) state.recognition.stop();
  } else {
    startListening();
  }
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('⚠️ Chrome 브라우저를 사용해주세요.', ''); return; }

  const btn = document.getElementById('mic-btn');
  btn.classList.add('listening');
  setStatus('듣는 중...', 'listening');
  document.getElementById('answer-reveal').classList.remove('visible');
  startWave();

  const rec = new SR();
  rec.lang = 'en-US'; rec.continuous = false; rec.interimResults = true;
  let finalText = '', silenceTimer = null;

  rec.onstart = () => { state.isListening = true; };
  rec.onresult = (e) => {
    let interim = '';
    finalText = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    document.getElementById('live-transcript').textContent = (finalText + interim).trim();
    if (silenceTimer) clearTimeout(silenceTimer);
    silenceTimer = setTimeout(() => { if (finalText.trim()) rec.stop(); }, 1500);
  };
  rec.onend = () => {
    state.isListening = false;
    stopWave();
    btn.classList.remove('listening');
    if (silenceTimer) clearTimeout(silenceTimer);
    const answer = finalText.trim();
    if (answer) {
      submitAnswer(answer);
    } else {
      setStatus('🎤 버튼을 눌러 영어로 말해보세요', '');
      document.getElementById('live-transcript').textContent = '(아무 말도 감지되지 않았어요)';
    }
  };
  rec.onerror = (e) => {
    stopWave();
    if (e.error === 'not-allowed') setStatus('❌ 마이크 접근을 허용해주세요.', '');
    else setStatus('🎤 버튼을 눌러 영어로 말해보세요', '');
  };

  state.recognition = rec;
  rec.start();
}

// ── 답변 제출 + 판정 ──
async function submitAnswer(userAnswer) {
  setStatus('분석 중...', '');
  state.attemptOnCard++;

  try {
    const res = await fetch(`${API_BASE}/api/practice/check`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: state.token,
        card_id: state.currentCard.id,
        user_answer: userAnswer,
        target_sentence: state.currentCard.sentence
      })
    });
    const data = await res.json();

    if (!res.ok) {
      if (res.status === 429) { endSession(); return; }
      setStatus('오류가 발생했어요. 다시 시도해주세요.', '');
      return;
    }

    state.usedToday = data.used_today;
    updateCountBadge();
    renderAttemptDots();

    if (data.passed) {
      state.passCount++;
      setStatus('✅ 정확해요! 잘했어요', 'pass');
      await markCardComplete(true);
      setTimeout(() => {
        if (state.usedToday >= state.limitToday) { endSession(); return; }
        state.deckIndex++;
        loadCard();
      }, 1200);
    } else {
      const reveal = document.getElementById('answer-reveal');
      const note = state.currentCard.keyword_note ? `\n\n${state.currentCard.keyword_note}` : '';
      reveal.textContent = '💡 ' + state.currentCard.sentence + note;
      reveal.classList.add('visible');

      if (state.attemptOnCard >= MAX_REPEAT) {
        setStatus('이렇게 말하면 더 좋아요. 다음 카드로 넘어갈게요.', 'fail');
        await markCardComplete(false);
        setTimeout(() => {
          if (state.usedToday >= state.limitToday) { endSession(); return; }
          state.deckIndex++;
          loadCard();
        }, 2200);
      } else {
        setStatus('다시 한번 말해볼까요?', 'fail');
      }
    }
  } catch {
    setStatus('네트워크 오류. 다시 시도해주세요.', '');
  }
}

async function markCardComplete(passed) {
  try {
    const res = await fetch(`${API_BASE}/api/practice/complete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: state.token,
        card_id: state.currentCard.id,
        passed
      })
    });
    const data = await res.json();
    if (res.ok) {
      state.usedToday = data.used_today;
      updateCountBadge();
    }
  } catch {
    // 네트워크 오류 시 조용히 무시 (다음 카드로는 계속 진행)
  }
}

function nextCard() {
  if (state.recognition) state.recognition.abort();
  state.deckIndex++;
  loadCard();
}

// ── UI 헬퍼 ──
function setStatus(text, cls) {
  const el = document.getElementById('status-text');
  el.textContent = text;
  el.className = 'status-text' + (cls ? ' ' + cls : '');
}
function startWave() { document.querySelectorAll('.wave-bar').forEach(b => b.classList.add('active')); }
function stopWave() { document.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('active')); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function showLoading(t) { document.getElementById('loading-text').textContent = t || '...'; document.getElementById('loading').style.display = 'flex'; }
function hideLoading() { document.getElementById('loading').style.display = 'none'; }
function showError(m) { const el = document.getElementById('login-error'); el.textContent = m; el.style.display = 'block'; }
function hideError() { document.getElementById('login-error').style.display = 'none'; }
function updateCountBadge() {
  const badge = document.getElementById('count-badge');
  badge.textContent = `${state.usedToday}/${state.limitToday}`;
  if (state.usedToday >= state.limitToday - 5) badge.classList.add('urgent');
}

function endSession() {
  if (state.recognition) state.recognition.abort();
  document.getElementById('header').style.display = 'none';
  document.getElementById('stat-pass').textContent = state.passCount;
  document.getElementById('stat-total').textContent = state.usedToday;
  document.getElementById('end-sub').textContent =
    state.usedToday >= state.limitToday
      ? '오늘의 연습 횟수(30회)를 모두 사용했어요. 내일 다시 만나요! 🌟'
      : '수고하셨어요. 오늘도 한 걸음 성장했습니다!';
  showScreen('end-screen');
}

document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
init();
</script>
